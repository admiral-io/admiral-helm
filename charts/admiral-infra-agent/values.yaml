# Default values for admiral-infra-agent.
# This is a YAML-formatted file.

# -- Number of replicas for the infra-agent deployment. Each replica independently
# polls the Admiral control plane for jobs, so more replicas = more concurrent
# job capacity.
replicaCount: 1

# -- Container image configuration
image:
  # -- Image repository
  repository: ghcr.io/admiral-io/admiral-infra-agent
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# =============================================================================
# Agent Configuration
# =============================================================================

# -- Admiral infra-agent runtime configuration.
# Maps directly to the binary's flags and env vars (see `admiral-infra-agent run --help`).
agent:
  # -- Admiral control-plane address (host:port). Maps to ADMIRAL_SERVER / --server.
  # Required.
  server: ""
  # -- Runner SAT token (adms_...). Maps to ADMIRAL_RUNNER_TOKEN / --token.
  # Prefer `existingSecret` for production. If set here, a Secret is generated.
  token: ""
  # -- Name of an existing Secret containing the runner token. Takes precedence
  # over `token`. The Secret must contain the key given by `existingSecretKey`.
  existingSecret: ""
  # -- Key within `existingSecret` that holds the runner token
  existingSecretKey: runner-token
  # -- How often to poll for new jobs when idle. Maps to --poll-interval.
  pollInterval: 5s
  # -- Skip TLS verification against the Admiral server (plaintext gRPC + HTTP).
  # Only enable for local/dev clusters. Maps to --insecure.
  insecure: false
  # -- Root directory for per-job workspaces. The entrypoint pre-sets this to
  # /workspace in the image; override if you mount a different writable path.
  # Maps to ADMIRAL_WORKSPACE_DIR / --workspace-dir.
  workspaceDir: /workspace
  # -- Enable verbose (debug) logging. Maps to --verbose.
  verbose: false
  # -- Additional CLI args appended to the `run` subcommand
  extraArgs: []

# =============================================================================
# Tool Versions
# =============================================================================

# -- Terraform / OpenTofu versions installed at container startup by entrypoint.sh.
# Leave empty to use whatever the image was built with (usually `latest`).
# Accepts any version string tfenv/tofuenv recognises (e.g. "1.9.8").
tools:
  # -- Terraform version (consumed via TERRAFORM_VERSION env var)
  terraformVersion: ""
  # -- OpenTofu version (consumed via TOFU_VERSION env var)
  tofuVersion: ""

# =============================================================================
# ServiceAccount (Workload Identity / IRSA)
# =============================================================================

# -- Service account configuration.
# To grant the agent cloud-provider permissions without mounting long-lived
# credentials, set the corresponding annotation and the AWS/GCP SDK (invoked
# by Terraform) will pick up tokens automatically.
serviceAccount:
  # -- Create a service account
  create: true
  # -- Automatically mount the service account token.
  # Must stay true for EKS IRSA and GKE Workload Identity to work.
  automount: true
  # -- Annotations to add to the service account.
  #
  # EKS IRSA:
  #   eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/admiral-infra-agent"
  #
  # GKE Workload Identity:
  #   iam.gke.io/gcp-service-account: "admiral-infra-agent@PROJECT.iam.gserviceaccount.com"
  #
  # Azure Workload Identity (requires pod label azure.workload.identity/use: "true"):
  #   azure.workload.identity/client-id: "CLIENT_ID"
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# =============================================================================
# Pod Configuration
# =============================================================================

# -- Annotations to add to pods
podAnnotations: {}

# -- Labels to add to pods.
# Set `azure.workload.identity/use: "true"` here when using Azure Workload Identity.
podLabels: {}

# -- Pod security context
podSecurityContext: {}
  # fsGroup: 65532

# -- Container security context.
# The image already runs as uid/gid 65532 (nonroot).
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 65532
  # runAsGroup: 65532

# -- Grace period for the pod to finish its active Terraform/OpenTofu job on
# SIGTERM before Kubernetes force-kills it. The agent drains in-flight jobs
# before exiting; set this at least as long as your longest expected job.
terminationGracePeriodSeconds: 300

# =============================================================================
# Resources & Probes
# =============================================================================

# -- Resource requests/limits.
# Terraform runs are CPU- and I/O-heavy; size accordingly.
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 1Gi
  # requests:
  #   cpu: 200m
  #   memory: 256Mi

# -- Liveness probe. The agent exposes no HTTP endpoint, so use an exec probe.
# Disabled by default because an unresponsive agent is still useful (it will
# finish its current job) and probe failures force-kill the process.
livenessProbe: {}
  # exec:
  #   command:
  #     - pgrep
  #     - admiral-infra-agent
  # initialDelaySeconds: 30
  # periodSeconds: 30
  # failureThreshold: 3

# -- Readiness probe. The agent is a poll-based client and has no concept of
# "not ready to serve traffic", so this is rarely needed.
readinessProbe: {}

# =============================================================================
# Autoscaling
# =============================================================================

# -- Horizontal Pod Autoscaler configuration.
# CPU-based scaling works because Terraform runs are CPU-heavy, but consider
# KEDA with a queue-length metric for finer control.
autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 10
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# Pod Disruption Budget
# =============================================================================

# -- Pod Disruption Budget.
# Recommended for production: protects active job runs from voluntary evictions
# (node drains, cluster upgrades). Note that with replicaCount=1 a PDB with
# minAvailable=1 will block node drains entirely — run at least 2 replicas, or
# use `maxUnavailable: 1` instead.
pdb:
  # -- Create a PDB resource
  create: false
  # -- Minimum number of available pods
  minAvailable: 1
  # -- Maximum number of unavailable pods
  maxUnavailable: ""

# =============================================================================
# Network Policy
# =============================================================================

# -- Network Policy configuration.
# The agent only needs egress (DNS, Admiral control plane, cloud-provider APIs,
# Terraform module sources). Ingress is not required.
networkPolicy:
  # -- Enable NetworkPolicy
  enabled: false
  # -- Allow outbound connections to any destination. Set false to restrict to
  # explicit destinations; then use `extraEgress` to whitelist Admiral, cloud
  # APIs, git servers, etc.
  allowExternalEgress: true
  # -- Additional egress rules
  extraEgress: []
  # -- Additional ingress rules (usually none for a worker)
  extraIngress: []

# =============================================================================
# Extensibility
# =============================================================================

# -- Extra environment variables for the agent container.
# Use this for cloud credentials that Terraform will pick up:
#   - name: AWS_REGION
#     value: us-east-1
#   - name: VAULT_ADDR
#     value: https://vault.example.com
extraEnvVars: []

# -- Name of a ConfigMap containing extra environment variables (envFrom)
extraEnvVarsCM: ""

# -- Name of a Secret containing extra environment variables (envFrom).
# Common pattern: put AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY or VAULT_TOKEN here.
# Prefer IRSA/Workload Identity via serviceAccount.annotations over static keys.
extraEnvVarsSecret: ""

# -- Extra volumes for the agent pod.
# Example: mount a Secret containing ~/.aws/credentials or a kubeconfig.
extraVolumes: []
  # - name: aws-credentials
  #   secret:
  #     secretName: aws-credentials

# -- Extra volume mounts for the agent container.
extraVolumeMounts: []
  # - name: aws-credentials
  #   mountPath: /home/nonroot/.aws
  #   readOnly: true

# -- Extra init containers for the agent pod
initContainers: []

# -- Extra sidecar containers for the agent pod
sidecars: []

# =============================================================================
# Scheduling
# =============================================================================

# -- Node selector for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations: []

# -- Affinity rules for pod assignment
affinity: {}
