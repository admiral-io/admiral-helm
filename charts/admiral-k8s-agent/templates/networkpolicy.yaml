{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "admiral-k8s-agent.fullname" . }}
  labels:
    {{- include "admiral-k8s-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "admiral-k8s-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowExternalEgress }}
    - {}
    {{- else }}
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Admiral control plane (parsed from agent.server)
    {{- if .Values.agent.server }}
    - ports:
        - port: {{ (split ":" .Values.agent.server)._1 | default 443 }}
          protocol: TCP
    {{- end }}
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- end }}
{{- end }}
