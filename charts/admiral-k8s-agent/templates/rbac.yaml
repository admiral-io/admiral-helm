{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "admiral-k8s-agent.fullname" . }}
  labels:
    {{- include "admiral-k8s-agent.labels" . | nindent 4 }}
{{- with .Values.rbac.rules }}
rules:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "admiral-k8s-agent.fullname" . }}
  labels:
    {{- include "admiral-k8s-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "admiral-k8s-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "admiral-k8s-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
