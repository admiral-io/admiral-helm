{{- if not .Values.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "admiral.fullname" . }}
  labels:
    {{- include "admiral.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
data:
  config.yaml: |
    server:
      listener:
        address: 0.0.0.0
        port: {{ .Values.server.port }}
      timeouts:
        default: {{ .Values.server.timeouts.default }}
      logger:
        level: {{ .Values.server.logLevel }}
      access_log:
        status_code_filters:
          {{- range .Values.server.accessLog.statusCodeFilters }}
          - {{ . }}
          {{- end }}
      enable_pprof: {{ .Values.server.enablePprof }}
      stats:
        flush_interval: {{ .Values.server.stats.flushInterval }}
        go_runtime_stats:
          collection_interval: {{ .Values.server.stats.goRuntimeCollectionInterval }}
        reporter_type: {{ .Values.server.stats.reporterType }}
    endpoints:
      manifest:
        bucket_name: {{ .Values.buckets.manifests }}
      revision:
        bucket_name: {{ .Values.buckets.revisions }}
    services:
      authn:
        name: {{ .Values.oauth2.name }}
        issuer: {{ include "admiral.oauth2.issuer" . }}
        client_id: {{ .Values.oauth2.clientId }}
        client_secret: ${OAUTH2_CLIENT_SECRET}
        scopes: {{ .Values.oauth2.scopes }}
        redirect_url: {{ include "admiral.oauth2.redirectUrl" . }}
        signing_secret: ${OAUTH2_SIGNING_SECRET}
        refresh_token_ttl: {{ .Values.oauth2.refreshTokenTTL }}
      database:
        host: {{ include "admiral.database.host" . }}
        port: {{ include "admiral.database.port" . }}
        database_name: {{ include "admiral.database.name" . }}
        user: {{ include "admiral.database.user" . }}
        password: ${DATABASE_PASSWORD}
        ssl_mode: {{ include "admiral.database.sslMode" . }}
      object_storage:
        type: {{ .Values.objectStorage.type }}
        {{- if eq .Values.objectStorage.type "s3" }}
        s3:
          endpoint: {{ include "admiral.objectStorage.endpoint" . }}
          region: {{ .Values.objectStorage.s3.region }}
          use_ssl: {{ .Values.objectStorage.s3.useSSL }}
          {{- if include "admiral.objectStorage.secretName" . }}
          access_key: ${STORAGE_ACCESS_KEY}
          secret_key: ${STORAGE_SECRET_KEY}
          {{- end }}
        {{- end }}
        {{- if eq .Values.objectStorage.type "gcs" }}
        gcs:
          project_id: {{ .Values.objectStorage.gcs.projectId }}
          {{- if .Values.objectStorage.gcs.existingSecret }}
          credentials_json: ${GCS_CREDENTIALS_JSON}
          {{- end }}
        {{- end }}
      session:
        idle_timeout: {{ .Values.session.idleTimeout }}
        lifetime: {{ .Values.session.lifetime }}
        cookie:
          name: {{ .Values.session.cookie.name }}
          domain: {{ .Values.session.cookie.domain | default "" | quote }}
          http_only: {{ .Values.session.cookie.httpOnly }}
          same_site: {{ .Values.session.cookie.sameSite }}
          secure: {{ .Values.session.cookie.secure }}
          persist: {{ .Values.session.cookie.persist }}
{{- end }}
