{{- include "admiral.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admiral.fullname" . }}
  labels:
    {{- include "admiral.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "admiral.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.existingConfigMap }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "admiral.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "admiral.serviceAccountName" . }}
      {{- if and .Values.dex.enabled .Values.ingress.enabled }}
      {{- $ingressSvc := lookup "v1" "Service" "ingress-nginx" "ingress-nginx-controller" }}
      {{- if $ingressSvc }}
      hostAliases:
        - ip: {{ $ingressSvc.spec.clusterIP | quote }}
          hostnames:
            - {{ .Values.ingress.host | quote }}
      {{- end }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - start
            - --config
            - /etc/admiral/config.yaml
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            # --- Secrets (injected via env vars, not in ConfigMap) ---
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.database.secretName" . }}
                  key: {{ include "admiral.database.secretKey" . }}
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.oauth2.secretName" . }}
                  key: {{ .Values.oauth2.clientSecretKey | default "client-secret" }}
            - name: OAUTH2_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.oauth2.secretName" . }}
                  key: {{ .Values.oauth2.signingSecretKey | default "signing-secret" }}
            {{- if and (eq .Values.objectStorage.type "s3") (include "admiral.objectStorage.secretName" . ) }}
            - name: STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.objectStorage.secretName" . }}
                  key: {{ include "admiral.objectStorage.accessKeyKey" . }}
            - name: STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.objectStorage.secretName" . }}
                  key: {{ include "admiral.objectStorage.secretKeyKey" . }}
            {{- end }}
            {{- if and (eq .Values.objectStorage.type "gcs") .Values.objectStorage.gcs.existingSecret }}
            - name: GCS_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.objectStorage.gcs.existingSecret }}
                  key: {{ .Values.objectStorage.gcs.secretKey | default "credentials-json" }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          {{- if or .Values.extraEnvVarsCM .Values.extraEnvVarsSecret }}
          envFrom:
            {{- if .Values.extraEnvVarsCM }}
            - configMapRef:
                name: {{ include "admiral.tplvalues.render" (dict "value" .Values.extraEnvVarsCM "context" $) }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ include "admiral.tplvalues.render" (dict "value" .Values.extraEnvVarsSecret "context" $) }}
            {{- end }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/admiral
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
        {{- with .Values.sidecars }}
        {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Values.existingConfigMap | default (include "admiral.fullname" .) }}
        {{- with .Values.extraVolumes }}
        {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
