{{- if .Values.dex.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admiral.dex.fullname" . }}
  labels:
    {{- include "admiral.dex.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "admiral.dex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/dex/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "admiral.dex.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "admiral.dex.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dex
          image: "{{ .Values.dex.image.repository }}:{{ .Values.dex.image.tag }}"
          imagePullPolicy: {{ .Values.dex.image.pullPolicy }}
          command:
            - /usr/local/bin/dex
            - serve
            - /etc/dex/config.yaml
          ports:
            - name: http
              containerPort: 5556
              protocol: TCP
          env:
            - name: DEX_DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.oauth2.secretName" . }}
                  key: dex-demo-password-hash
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.oauth2.secretName" . }}
                  key: client-secret
            {{- with .Values.dex.extraEnvVars }}
            {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ if .Values.ingress.enabled }}/dex{{ end }}/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ if .Values.ingress.enabled }}/dex{{ end }}/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.dex.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
            {{- with .Values.dex.extraVolumeMounts }}
            {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "admiral.dex.fullname" . }}
        {{- with .Values.dex.extraVolumes }}
        {{- include "admiral.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}
        {{- end }}
{{- end }}
