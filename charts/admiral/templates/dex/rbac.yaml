{{- if and .Values.dex.enabled .Values.dex.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "admiral.dex.fullname" . }}
  labels:
    {{- include "admiral.dex.labels" . | nindent 4 }}
rules:
  - apiGroups: ["dex.coreos.com"]
    resources:
      - authcodes
      - authrequests
      - authsessions
      - connectors
      - devicerequests
      - devicetokens
      - oauth2clients
      - offlinesessionses
      - passwords
      - refreshtokens
      - signingkeies
      - useridentities
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # Dex 2.46+ defaults to crdHandling: ensure and self-creates its CRDs on
  # startup. Granting cluster-scoped CRD perms lets that path succeed.
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "admiral.dex.fullname" . }}
  labels:
    {{- include "admiral.dex.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "admiral.dex.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "admiral.dex.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
