{{- if .Values.dex.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "admiral.dex.fullname" . }}
  labels:
    {{- include "admiral.dex.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.dex.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "admiral.dex.selectorLabels" . | nindent 4 }}
{{- end }}
