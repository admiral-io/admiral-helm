{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
{{- $secretName := include "admiral.postgres.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else if .Values.postgres.auth.password -}}
{{- $password = .Values.postgres.auth.password -}}
{{- else -}}
{{- $password = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "admiral.postgres.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
