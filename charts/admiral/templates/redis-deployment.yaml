{{- if .Values.redis.enabled }}
{{- if .Values.redis.persistence.enabled }}
{{- if not .Values.redis.persistence.existingClaim }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "admiral.redis.fullname" . }}
  labels:
    {{- include "admiral.redis.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
  {{- with .Values.redis.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admiral.redis.fullname" . }}
  labels:
    {{- include "admiral.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "admiral.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "admiral.redis.labels" . | nindent 8 }}
    spec:
      {{- with .Values.redis.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          {{- with .Values.redis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - redis-server
            - --save
            - {{ if .Values.redis.persistence.enabled }}"3600 1"{{ else }}""{{ end }}
            - --appendonly
            - {{ if .Values.redis.persistence.enabled }}"yes"{{ else }}"no"{{ end }}
            {{- if .Values.redis.auth.enabled }}
            - --requirepass
            - "$(REDIS_PASSWORD)"
            {{- end }}
          {{- if .Values.redis.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "admiral.redis.secretName" . }}
                  key: {{ include "admiral.redis.secretKey" . }}
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                {{- if .Values.redis.auth.enabled }}
                - redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping | grep PONG
                {{- else }}
                - redis-cli ping | grep PONG
                {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.redis.persistence.existingClaim | default (include "admiral.redis.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
