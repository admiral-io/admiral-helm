{{- if and .Values.redis.enabled .Values.redis.auth.enabled (not .Values.redis.auth.existingSecret) }}
{{- $secretName := include "admiral.redis.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existing -}}
{{- $password = index $existing.data "redis-password" | b64dec -}}
{{- else if .Values.redis.auth.password -}}
{{- $password = .Values.redis.auth.password -}}
{{- else -}}
{{- $password = randAlphaNum 24 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "admiral.redis.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ $password | b64enc | quote }}
{{- end }}
