{{- if not .Values.oauth2.existingSecret }}
{{- $secretName := printf "%s-oauth2" (include "admiral.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $clientSecret := "" }}
{{- $signingSecret := "" }}
{{- $demoPassword := "" }}
{{- $demoPasswordHash := "" }}
{{- if $existing }}
  {{- $clientSecret = index $existing.data "client-secret" | b64dec }}
  {{- $signingSecret = index $existing.data "signing-secret" | b64dec }}
  {{- if .Values.dex.enabled }}
    {{- $demoPassword = index $existing.data "dex-demo-password" | default "" | b64dec }}
    {{- $demoPasswordHash = index $existing.data "dex-demo-password-hash" | default "" | b64dec }}
  {{- end }}
{{- else }}
  {{- $clientSecret = .Values.oauth2.clientSecret | default (randAlphaNum 32) }}
  {{- $signingSecret = .Values.oauth2.signingSecret | default (randAlphaNum 32) }}
  {{- if .Values.dex.enabled }}
    {{- $demoPassword = .Values.oauth2.demoPassword | default (randAlphaNum 16) }}
    {{- $demoPasswordHash = (bcrypt $demoPassword) }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "admiral.labels" . | nindent 4 }}
type: Opaque
data:
  client-secret: {{ $clientSecret | b64enc | quote }}
  signing-secret: {{ $signingSecret | b64enc | quote }}
  {{- if .Values.dex.enabled }}
  dex-demo-password: {{ $demoPassword | b64enc | quote }}
  dex-demo-password-hash: {{ $demoPasswordHash | b64enc | quote }}
  {{- end }}
{{- end }}
